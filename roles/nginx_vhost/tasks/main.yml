---
- name: Установка значений по умолчанию
  set_fact:
    vhost_root_base: "{{ vhost_root_base | default('/var/www') }}"
    vhost_port: "{{ vhost_port | default(80) }}"
    vhost_extra_params: "{{ vhost_extra_params | default('') }}"

- name: Установка Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Создание корневой директории для vhost
  file:
    path: "{{ vhost_root_base }}/{{ vhost_name }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Создание индексного файла из шаблона
  template:
    src: index.html.j2
    dest: "{{ vhost_root_base }}/{{ vhost_name }}/index.html"
    owner: www-data
    group: www-data
    mode: '0644'

- name: Создание конфигурации vhost из шаблона
  template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ vhost_name }}.conf"
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: Включение vhost (создание симлинка)
  file:
    src: "/etc/nginx/sites-available/{{ vhost_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ vhost_name }}.conf"
    state: link
  when: ansible_os_family == "Debian"
  notify: reload nginx

- name: Проверка конфигурации Nginx перед перезагрузкой
  command: nginx -t
  changed_when: false
  notify: reload nginx
